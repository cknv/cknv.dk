{% extends "layout.html" %}
{% block content %}
{{ page.html }}
{% for group, pages in page.subpages|dictsort %}
    <div id='{{ group|slug }}'>
        <h3>{{ group }}</h2>
        <ul>
    {% for subpage in pages|sort(attribute='meta.date', reverse=True) %}
        <li>{{ subpage.meta.date }} <a href='{{ subpage.meta.url }}'>{{ subpage.meta.title }}</a></li>
    {% endfor %}
        </ul>
    </div>
{% endfor %}
    <hr />
{% endblock %}
